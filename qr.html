<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Code - รายรับรายจ่าย</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #F0F4F8;
    }
    h2 { color: #1565C0; margin-bottom: 8px; font-size: 20px; }
    p  { color: #666; font-size: 13px; margin: 0 0 24px; }
    #qr {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .url {
      margin-top: 20px;
      font-size: 13px;
      color: #1565C0;
      word-break: break-all;
      text-align: center;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <h2>📱 สแกนเพื่อเปิดแอป</h2>
  <p>ใช้กล้องโทรศัพท์หรือ Chrome สแกน QR Code นี้</p>
  <div id="qr"></div>
  <div class="url">https://moslnwstep5555-code.github.io/rairab/</div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qr'), {
      text: 'https://moslnwstep5555-code.github.io/rairab/',
      width: 260,
      height: 260,
      colorDark: '#1565C0',
      colorLight: '#ffffff',
    });
  </script>
</body>
</html>
